<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم ميجو | Control Panel</title>
    <style>
        :root { --gold: #D4AF37; --dark: #050505; --matrix: #00FF41; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* تأثير خلفية الماتريكس البسيط */
        body::before {
            content: "101101001"; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            color: rgba(0, 255, 65, 0.05); font-size: 20px; word-break: break-all; z-index: -1; pointer-events: none;
        }

        .container { max-width: 800px; margin: auto; }
        .card { background: rgba(20, 20, 20, 0.95); border: 1px solid var(--gold); border-radius: 15px; padding: 25px; margin-bottom: 30px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--gold); border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: var(--matrix); outline: none; }
        
        button { width: 100%; padding: 15px; background: var(--gold); color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: white; box-shadow: 0 0 10px var(--gold); }
        
        /* قسم الإدارة */
        .course-item { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-right: 4px solid var(--gold); border-radius: 5px; }
        .del-btn { background: #ff4d4d; color: white; width: auto; padding: 5px 15px; font-size: 13px; }
        .del-btn:hover { background: white; color: red; }
        
        #status { padding: 10px; margin-top: 10px; border-radius: 5px; text-align: center; display: none; }

        /* --- New Additive Styles --- */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .metric-box { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; text-align: center; }
        .metric-value { display: block; font-size: 24px; color: var(--gold); font-weight: bold; margin-top: 5px; }
        .metric-label { font-size: 12px; color: #888; text-transform: uppercase; }
        .health-indicator { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .health-green { background: #00FF41; box-shadow: 0 0 5px #00FF41; }
        .health-red { background: #ff4d4d; box-shadow: 0 0 5px #ff4d4d; }
        
        .preview-container { margin-top: 20px; border-top: 1px dashed #333; padding-top: 20px; }
        .preview-card { background: #1a1a1a; border: 1px solid var(--gold); border-radius: 10px; padding: 15px; position: relative; overflow: hidden; }
        .preview-card::after { content: 'LIVE PREVIEW'; position: absolute; top: 5px; left: 5px; font-size: 8px; color: var(--gold); opacity: 0.5; }
        .preview-title { color: var(--gold); font-size: 18px; margin-bottom: 5px; }
        .preview-desc { color: #ccc; font-size: 14px; margin-bottom: 10px; }
        .preview-tag { display: inline-block; padding: 3px 8px; background: var(--gold); color: black; font-size: 10px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; color: var(--gold);">SYSTEM ADMIN: MEGO CODE</h1>

    <!-- New Metrics Dashboard Layer -->
    <div class="metrics-grid">
        <div class="metric-box">
            <span class="metric-label">Total Courses</span>
            <span id="count-courses" class="metric-value">0</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Total Videos</span>
            <span id="count-videos" class="metric-value">0</span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Server Health</span>
            <span class="metric-value">
                <span id="health-dot" class="health-indicator health-red"></span>
                <small id="health-text" style="font-size: 12px;">OFFLINE</small>
            </span>
        </div>
        <div class="metric-box">
            <span class="metric-label">Last Update</span>
            <span id="last-update" class="metric-value" style="font-size: 14px;">--:--</span>
        </div>
    </div>

    <div class="card">
        <h2>📂 إضافة محتوى جديد (كورس / صوت)</h2>
        <input type="password" id="pass" placeholder="مفتاح الأمان الخاص بميجو">
        <input type="text" id="title" placeholder="عنوان الكورس أو المقطع الصوتي" oninput="updateLivePreview()">
        <textarea id="desc" rows="3" placeholder="وصف المحتوى..." oninput="updateLivePreview()"></textarea>
        <input type="text" id="url" placeholder="رابط التحميل أو رابط ملف الصوت">
        
        <select id="type" onchange="updateLivePreview()">
            <option value="course">كورس / سورس كود</option>
            <option value="audio">مقطع صوتي / Voice</option>
        </select>

        <button onclick="uploadData()">🚀 تشغيل الأمر / نـشـر</button>
        <div id="status"></div>

        <!-- New Live Preview Engine -->
        <div class="preview-container" id="preview-area" style="display: none;">
            <div class="preview-card">
                <div id="p-title" class="preview-title"></div>
                <div id="p-desc" class="preview-desc"></div>
                <div id="p-tag" class="preview-tag"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>🛠️ إدارة المحتوى المنشور</h2>
        <div id="admin-list">جاري فحص قاعدة البيانات...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAnjhujvWjLe9Z2KsIm-82rRB-00oGiIRw",
        authDomain: "mego-vip-site.firebaseapp.com",
        projectId: "mego-vip-site",
        databaseURL: "https://mego-vip-site-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- New Real-time Analytics Layer ---
    function updateMetrics(data) {
        let courses = 0;
        let videos = 0;
        for (let id in data) {
            if (data[id].type === 'course') courses++;
            else if (data[id].type === 'audio') videos++;
        }
        document.getElementById('count-courses').innerText = courses;
        document.getElementById('count-videos').innerText = videos;
    }

    function updateHealth(status) {
        const dot = document.getElementById('health-dot');
        const text = document.getElementById('health-text');
        if (status) {
            dot.className = 'health-indicator health-green';
            text.innerText = 'CONNECTED';
        } else {
            dot.className = 'health-indicator health-red';
            text.innerText = 'DISCONNECTED';
        }
    }

    function trackUpdate() {
        const now = new Date();
        document.getElementById('last-update').innerText = now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    // Monitor Firebase Connection
    db.ref(".info/connected").on("value", (snap) => {
        updateHealth(snap.val() === true);
    });

    // --- New Live Preview Engine ---
    function updateLivePreview() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const type = document.getElementById('type').value;
        const previewArea = document.getElementById('preview-area');
        
        if (title || desc) {
            previewArea.style.display = 'block';
            document.getElementById('p-title').innerText = title || 'عنوان المعاينة';
            document.getElementById('p-desc').innerText = desc || 'وصف المعاينة سيظهر هنا...';
            document.getElementById('p-tag').innerText = type === 'audio' ? '🔊 صوت' : '📚 كورس';
        } else {
            previewArea.style.display = 'none';
        }
    }

    // دالة النشر
    function uploadData() {
        const pass = document.getElementById('pass').value;
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const url = document.getElementById('url').value;
        const type = document.getElementById('type').value;
        const status = document.getElementById('status');

        if(pass !== "mego2026") { alert("خطأ في مفتاح الأمان!"); return; }

        if(title && url) {
            status.style.display = "block";
            status.innerText = "Processing...";
            db.ref('content').push({
                title: title,
                desc: desc,
                url: url,
                type: type,
                date: new Date().toLocaleDateString('ar-EG')
            }).then(() => {
                status.innerText = "✅ تم الإرسال للنظام بنجاح!";
                trackUpdate(); // Track update without full reload if possible, but keeping original logic
                setTimeout(() => location.reload(), 1000); 
            });
        }
    }

    // جلب البيانات للحذف
    db.ref('content').on('value', (snapshot) => {
        const list = document.getElementById('admin-list');
        list.innerHTML = '';
        const data = snapshot.val();
        
        // Update Metrics Layer
        updateMetrics(data);
        
        for (let id in data) {
            list.innerHTML += `
                <div class="course-item">
                    <div>
                        <strong>${data[id].title}</strong> <br>
                        <small style="color:#888">${data[id].type === 'audio' ? '🔊 صوت' : '📚 كورس'}</small>
                    </div>
                    <button class="del-btn" onclick="deleteItem('${id}')">حذف 🗑️</button>
                </div>
            `;
        }
    });

    // دالة الحذف
    function deleteItem(id) {
        const pass = document.getElementById('pass').value;
        if(pass === "mego2026") {
            if(confirm("هل أنت متأكد من حذف هذا العنصر؟")) {
                db.ref('content').child(id).remove().then(() => {
                    trackUpdate();
                });
            }
        } else {
            alert("يرجى كتابة كلمة السر في خانة (مفتاح الأمان) أولاً لتتمكن من الحذف!");
        }
    }
</script>
</body>
</html>
